<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Web Security Scanner | Access Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        black: "#000000",
                        white: "#FFFFFF",
                        border: "#222222",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center justify-center p-6 font-sans antialiased">

    <div class="max-w-sm w-full space-y-12">
        
        <!-- Header -->
        <div class="space-y-4 text-center">
            <div class="flex justify-center mb-6">
                 <i data-lucide="shield-check" class="w-12 h-12"></i>
            </div>
            <h1 class="text-3xl font-black uppercase tracking-tighter">AI Web Security Scanner</h1>
            <p class="text-zinc-400 text-[10px] font-bold uppercase tracking-widest">Enterprise Access Node restricted</p>
        </div>

        <!-- Login Form -->
        <div class="space-y-8">
            <div id="auth-alert" class="hidden p-4 border border-white/20 bg-zinc-900/50 text-[10px] font-mono text-white text-center"></div>

            <form action="/login" method="POST" class="space-y-6">
                <div class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest px-1">Identity</label>
                        <input type="text" name="username" placeholder="Username" required 
                            class="w-full bg-black border border-border px-4 py-4 text-white focus:outline-none focus:border-white transition-all text-sm font-medium">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest px-1">Signature</label>
                        <input type="password" name="password" placeholder="••••••••" required 
                            class="w-full bg-black border border-border px-4 py-4 text-white focus:outline-none focus:border-white transition-all text-sm font-medium">
                    </div>
                </div>

                <div class="space-y-3 pt-4">
                    <button type="submit" class="w-full bg-white text-black hover:invert py-5 font-black text-xs uppercase tracking-[0.4em] transition-all active:scale-[0.98]">
                        Establish Link
                    </button>
                    <button type="button" onclick="toggleAuth()" id="toggleBtn" class="w-full text-[9px] font-bold text-zinc-500 hover:text-white uppercase tracking-widest transition-colors py-2">
                        Create New Node (Register)
                    </button>
                </div>
            </form>
        </div>

    </div>

    <script>
        lucide.createIcons();
        let isLogin = true;
        const form = document.querySelector('form');
        const title = document.querySelector('h1');
        const toggleBtn = document.getElementById('toggleBtn');
        const submitBtn = document.querySelector('button[type="submit"]');

        function toggleAuth() {
            isLogin = !isLogin;
            form.action = isLogin ? '/login' : '/register';
            title.textContent = isLogin ? 'AI Web Security Scanner' : 'Register Node';
            submitBtn.textContent = isLogin ? 'Establish Link' : 'Initialize Node';
            toggleBtn.textContent = isLogin ? 'Create New Node (Register)' : 'Return to Portal (Login)';
        }

        // Simple error handling from query params
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            const alert = document.getElementById('auth-alert');
            alert.textContent = urlParams.get('error');
            alert.classList.remove('hidden');
        }
    </script>
</body>
</html>
